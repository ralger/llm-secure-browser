version: '3.9'

services:
  llm-secure-browser:
    build: .
    image: llm-secure-browser:latest
    ports:
      - '3000:3000'
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # Chromium uses /dev/shm (shared memory) for rendering buffers. The Docker
    # default of 64 MB is far too small and causes tab crashes on complex pages.
    # 1 GB is comfortable for single-instance headless use.
    shm_size: '1gb'
    # Memory limits: Node.js ~150 MB + Chromium ~400 MB + page content + headroom.
    mem_limit: 1.5g
