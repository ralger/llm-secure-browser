version: '3.9'

services:
  llm-secure-browser:
    build: .
    image: llm-secure-browser:latest
    ports:
      - '3000:3000'
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Headed Chromium (required for Cloudflare bypass on ChurchSuite).
      # Xvfb is started by start.sh — this env var tells BrowserManager to
      # launch Chrome with headless:false so the virtual display is used.
      - BROWSER_HEADLESS=false
    # Chromium uses /dev/shm (shared memory) for rendering buffers. The Docker
    # default of 64 MB is far too small and causes tab crashes on complex pages.
    # 1 GB is comfortable for single-instance headed+headless use.
    shm_size: '1gb'
    # Memory limits: Node.js ~150 MB + Chromium ~500 MB (headed) + page content + headroom.
    mem_limit: 1.5g
